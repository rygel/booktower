# Weblate configuration for Runary
# Add this file to your Weblate project for automatic translation updates

# Weblate configuration file
version: 1

# Translation files
files:
  - filename: src/main/resources/messages.properties
    template: src/main/resources/messages.properties
    base: true
  - filename: src/main/resources/messages_fr.properties

# Language definitions
languages:
  - code: en
    name: English
  - code: fr
    name: French

# Project settings
project:
  name: Runary
  slug: runary
  web: https://github.com/yourorg/runary
  repo: https://github.com/yourorg/runary.git
  push: git@github.com:yourorg/runary.git

# Component settings
component:
  name: Runary Translations
  slug: runary-translations
  file_format: properties
  format_options:
    - key_separator: "."
