services:
  booktower:
    build: .
    image: booktower:latest
    ports:
      - "${BOOKTOWER_PORT:-9999}:9999"
    environment:
      BOOKTOWER_ENV: production
      BOOKTOWER_JWT_SECRET: ${BOOKTOWER_JWT_SECRET:?Set BOOKTOWER_JWT_SECRET in .env}
      BOOKTOWER_DB_URL: jdbc:mariadb://mariadb:3306/booktower
      BOOKTOWER_DB_USERNAME: ${MARIADB_USER:-booktower}
      BOOKTOWER_DB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}
      BOOKTOWER_DB_DRIVER: org.mariadb.jdbc.Driver
      BOOKTOWER_CSRF_ALLOWED_HOSTS: ${BOOKTOWER_CSRF_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - booktower-data:/data
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in .env}
      MARIADB_DATABASE: booktower
      MARIADB_USER: ${MARIADB_USER:-booktower}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10

volumes:
  booktower-data:
  mariadb-data:
