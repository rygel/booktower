services:
  booktower:
    build: .
    container_name: booktower
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - booktower_db:/data/db
      - booktower_books:/data/books
      - booktower_covers:/data/covers
      # Mount your local book collection (read-only):
      # - /path/to/your/books:/mnt/library:ro
    environment:
      BOOKTOWER_ENV: production
      # Override JWT secret in production:
      # BOOKTOWER_JWT_SECRET: "change-me-to-a-long-random-string"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  booktower_db:
  booktower_books:
  booktower_covers:
