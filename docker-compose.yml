services:
  booktower:
    build: .
    image: booktower:latest
    ports:
      - "${BOOKTOWER_PORT:-9999}:9999"
    environment:
      BOOKTOWER_ENV: production
      BOOKTOWER_JWT_SECRET: ${BOOKTOWER_JWT_SECRET:?Set BOOKTOWER_JWT_SECRET in .env}
      BOOKTOWER_DB_URL: jdbc:postgresql://postgres:5432/booktower
      BOOKTOWER_DB_USERNAME: ${POSTGRES_USER:-booktower}
      BOOKTOWER_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      BOOKTOWER_DB_DRIVER: org.postgresql.Driver
      BOOKTOWER_CSRF_ALLOWED_HOSTS: ${BOOKTOWER_CSRF_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - booktower-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: booktower
      POSTGRES_USER: ${POSTGRES_USER:-booktower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-booktower} -d booktower"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

volumes:
  booktower-data:
  postgres-data:
