services:
  runary:
    image: ghcr.io/rygel/runary:latest
    # To build from source instead:
    # build: .
    container_name: runary
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - runary_db:/data/db
      - runary_books:/data/books
      - runary_covers:/data/covers
      # Mount your local book collection (read-only):
      # - /path/to/your/books:/mnt/library:ro
    environment:
      RUNARY_ENV: production
      # REQUIRED in production — generate with: openssl rand -base64 32
      RUNARY_JWT_SECRET: "change-me-to-a-long-random-string"
      # Base URL — set this to your public-facing URL (used for Kobo sync, OPDS links, etc.)
      # RUNARY_BASE_URL: "https://books.example.com"
      # Registration — set to false to prevent new user sign-ups
      # RUNARY_REGISTRATION_OPEN: "true"
      # Auto-scan interval in minutes (set to 0 to disable)
      # RUNARY_AUTO_SCAN_MINUTES: "60"
      # Full-text search (experimental)
      # RUNARY_FTS_ENABLED: "false"
      # SMTP for email notifications (book delivery, password reset)
      # RUNARY_SMTP_HOST: ""
      # RUNARY_SMTP_PORT: "587"
      # RUNARY_SMTP_USER: ""
      # RUNARY_SMTP_PASS: ""
      # RUNARY_SMTP_FROM: ""
      # RUNARY_SMTP_TLS: "true"
      # Metadata providers (optional API keys)
      # RUNARY_HARDCOVER_API_KEY: ""
      # RUNARY_COMICVINE_API_KEY: ""
      # OIDC / SSO (uncomment and configure to enable)
      # OIDC_ISSUER: "https://auth.example.com/realms/runary"
      # OIDC_CLIENT_ID: "runary"
      # OIDC_CLIENT_SECRET: ""
      # OIDC_REDIRECT_URI: "https://books.example.com/auth/oidc/callback"
      # OIDC_SCOPE: "openid email profile"
      # OIDC_FORCE_ONLY: "false"
      # OIDC_ADMIN_GROUP_PATTERN: "^runary-admin$"
      # OIDC_GROUPS_CLAIM: "groups"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL (optional — uncomment for production) ──────────────────────
  # By default Runary uses an embedded H2 database (zero-config).
  # For production workloads, uncomment the postgres service below and
  # set the RUNARY_DB_* variables on the runary service.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: runary-postgres
  #   restart: unless-stopped
  #   volumes:
  #     - runary_pgdata:/var/lib/postgresql/data
  #   environment:
  #     POSTGRES_DB: runary
  #     POSTGRES_USER: runary
  #     POSTGRES_PASSWORD: "change-me-to-a-strong-password"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U runary"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #
  # When using PostgreSQL, add these to the runary service environment:
  #   RUNARY_DB_URL: "jdbc:postgresql://postgres:5432/runary"
  #   RUNARY_DB_USERNAME: "runary"
  #   RUNARY_DB_PASSWORD: "change-me-to-a-strong-password"
  #   RUNARY_DB_DRIVER: "org.postgresql.Driver"
  # And add to the runary service:
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  runary_db:
  runary_books:
  runary_covers:
  # runary_pgdata:
