# Detekt configuration
build:
  maxIssues: 10
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 6
    # AppHandler wires up all services via constructor injection — 10 params is acceptable
    constructorThreshold: 11
  LongMethod:
    active: true
    # Library scan is inherently involved; 90 is still a meaningful cap
    threshold: 90
  TooManyFunctions:
    active: true
    thresholdInFiles: 11
    # Handler classes accumulate one method per route; 25 is a sensible ceiling
    thresholdInClasses: 25
    thresholdInInterfaces: 11
  ComplexCondition:
    active: true
    # Rate-limit filter multi-condition check is intentional
    threshold: 5

style:
  active: true
  MagicNumber:
    active: true
    # JDBI positional bind indices (3-8) are positional by nature and cannot be meaningfully named
    ignoreNumbers: ['-1', '0', '1', '2', '3', '4', '5', '6', '7', '8']
    # Handlers and tests use inline values that are more readable without named constants
    excludes:
      - '**/handlers/**'
      - '**/test/**'
  ReturnCount:
    active: true
    # Two early-exit guards + one normal result is idiomatic Kotlin
    max: 3
    # HTTP handlers have one return per response path (auth, 404, validation, success) — that is by design
    excludes:
      - '**/handlers/**'
  MaxLineLength:
    active: true
    maxLineLength: 150
  MaxChainedCallsOnSameLine:
    active: true
    maxChainedCalls: 3
  WildcardImport:
    active: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false

potential-bugs:
  active: true
  ExplicitGarbageCollectionCall:
    active: true
  UnreachableCatchBlock:
    active: true

coroutines:
  active: true

naming:
  active: true
  FunctionNaming:
    active: false

performance:
  active: true
  SpreadOperator:
    active: true
  ArrayPrimitive:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    # Handlers/filters convert exceptions to HTTP responses; services and weblate
    # bridge network/DB errors; all of these broad catches are intentional.
    excludes:
      - '**/handlers/**'
      - '**/filters/**'
      - '**/services/**'
      - '**/weblate/**'
  SwallowedException:
    active: true
    excludes:
      - '**/handlers/**'
      - '**/filters/**'
      - '**/services/**'
      - '**/weblate/**'

empty-blocks:
  active: true
