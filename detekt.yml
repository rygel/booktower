# Detekt configuration
build:
  maxIssues: 10
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  LongMethod:
    active: true
    threshold: 60
  TooManyFunctions:
    active: true
    thresholdInFiles: 11
    thresholdInClasses: 15
    thresholdInInterfaces: 11

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 150
  MaxChainedCallsOnSameLine:
    active: true
    maxChainedCalls: 3
  WildcardImport:
    active: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false

potential-bugs:
  active: true
  ExplicitGarbageCollectionCall:
    active: true
  UnreachableCatchBlock:
    active: true

coroutines:
  active: true

naming:
  active: true
  FunctionNaming:
    active: false

performance:
  active: true
  SpreadOperator:
    active: true
  ArrayPrimitive:
    active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true

empty-blocks:
  active: true
