app:
  name: BookTower
  host: 0.0.0.0
  port: 9999

  csrf:
    allowedHosts:
      - localhost
      - 127.0.0.1
      - 0.0.0.0

  database:
    # H2 (default — zero-config, file-backed, PostgreSQL-compatible mode)
    url: "jdbc:h2:file:./data/booktower;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS public"
    username: sa
    password: ""
    driver: org.h2.Driver
    # PostgreSQL — override via environment variables:
    #   BOOKTOWER_DB_URL, BOOKTOWER_DB_USERNAME, BOOKTOWER_DB_PASSWORD, BOOKTOWER_DB_DRIVER

  security:
    jwtSecret: "booktower-secret-key-change-in-production"
    jwtIssuer: booktower
    sessionTimeout: 86400

  storage:
    booksPath: "./data/books"
    coversPath: "./data/covers"
    tempPath: "./data/temp"

  weblate:
    url: ""
    apiToken: ""
    component: "booktower/translations"
    enabled: false
