app {
  name = "BookTower"
  host = "0.0.0.0"
  port = 9999
  csrf {
    allowed-hosts = ["localhost", "127.0.0.1", "0.0.0.0"]
  }
  database {
    # H2 (default — zero-config, file-backed, PostgreSQL-compatible mode)
    url = "jdbc:h2:file:./data/booktower;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE"
    username = "sa"
    password = ""
    driver = "org.h2.Driver"
    # PostgreSQL — override via BOOKTOWER_DB_* environment variables:
    #   BOOKTOWER_DB_URL      = jdbc:postgresql://localhost:5432/booktower
    #   BOOKTOWER_DB_USERNAME = booktower
    #   BOOKTOWER_DB_PASSWORD = secret
    #   BOOKTOWER_DB_DRIVER   = org.postgresql.Driver
  }
  security {
    jwt-secret = "booktower-secret-key-change-in-production"
    jwt-issuer = "booktower"
    session-timeout = 86400
  }
  storage {
    books-path = "./data/books"
    covers-path = "./data/covers"
    temp-path = "./data/temp"
  }
  weblate {
    url = ""  # e.g., "https://weblate.example.com"
    api-token = ""  # Weblate API token
    component = "booktower/translations"  # Translation component slug
    enabled = false  # Set to true to enable Weblate integration
  }
}
