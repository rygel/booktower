app {
  name = "BookTower"
  host = "0.0.0.0"
  port = 9999
  csrf {
    allowed-hosts = ["localhost", "127.0.0.1", "0.0.0.0"]
  }
  database {
    url = "jdbc:h2:mem:booktower-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1"
    username = "sa"
    password = ""
    driver = "org.h2.Driver"
  }
  security {
    jwt-secret = "test-secret-key-not-for-production"
    jwt-issuer = "booktower"
    session-timeout = 86400
  }
  storage {
    books-path = "./data/test-books"
    covers-path = "./data/test-covers"
    temp-path = "./data/test-temp"
  }
  weblate {
    url = ""
    api-token = ""
    component = "booktower/translations"
    enabled = false
  }
}
