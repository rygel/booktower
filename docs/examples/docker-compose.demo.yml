# Runary — Demo Instance
# Starts with a pre-seeded demo account and sample library.
#
# Run: docker compose -f docker-compose.demo.yml up -d
# Access: http://localhost:9999
# Login:  demo / demo1234

services:
  runary:
    image: ghcr.io/rygel/runary:latest
    container_name: runary-demo
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - runary_demo_db:/data/db
      - runary_demo_books:/data/books
      - runary_demo_covers:/data/covers
    environment:
      RUNARY_QUICKSTART: "true"
      RUNARY_DEMO_MODE: "true"
      RUNARY_JWT_SECRET: "demo-instance-not-for-production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  runary_demo_db:
  runary_demo_books:
  runary_demo_covers:
