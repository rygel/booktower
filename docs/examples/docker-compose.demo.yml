# BookTower — Demo Instance
# Starts with a pre-seeded demo account and sample library.
#
# Run: docker compose -f docker-compose.demo.yml up -d
# Access: http://localhost:9999
# Login:  demo / demo1234

services:
  booktower:
    image: ghcr.io/rygel/booktower:latest
    container_name: booktower-demo
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - booktower_demo_db:/data/db
      - booktower_demo_books:/data/books
      - booktower_demo_covers:/data/covers
    environment:
      BOOKTOWER_QUICKSTART: "true"
      BOOKTOWER_DEMO_MODE: "true"
      BOOKTOWER_JWT_SECRET: "demo-instance-not-for-production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  booktower_demo_db:
  booktower_demo_books:
  booktower_demo_covers:
