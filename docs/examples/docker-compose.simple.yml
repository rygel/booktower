# BookTower — Simple Docker Compose (H2 embedded database)
# Quick setup: docker compose -f docker-compose.simple.yml up -d
# Access at: http://localhost:9999

services:
  booktower:
    image: ghcr.io/rygel/booktower:latest
    container_name: booktower
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - booktower_db:/data/db
      - booktower_books:/data/books
      - booktower_covers:/data/covers
    environment:
      BOOKTOWER_ENV: production
      BOOKTOWER_JWT_SECRET: "change-me-generate-with-openssl-rand-base64-32"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  booktower_db:
  booktower_books:
  booktower_covers:
