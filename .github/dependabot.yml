version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # Kotlin 2.3.x breaks CodeQL — stay on 2.2.x until CodeQL catches up
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">=2.3.0"]
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "kotlin-*"
      http4k:
        patterns:
          - "org.http4k*"
      jetty:
        patterns:
          - "org.eclipse.jetty*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
          - "tools.jackson*"
      database:
        patterns:
          - "org.jdbi*"
          - "com.h2database*"
          - "org.postgresql*"
          - "com.zaxxer*"
          - "org.flywaydb*"
      testing:
        patterns:
          - "org.junit*"
          - "io.mockk*"
          - "org.testcontainers*"
          - "com.microsoft.playwright*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "org.jetbrains.kotlin*"
          - "org.http4k*"
          - "org.eclipse.jetty*"
          - "com.fasterxml.jackson*"
          - "tools.jackson*"
          - "org.jdbi*"
          - "com.h2database*"
          - "org.postgresql*"
          - "com.zaxxer*"
          - "org.flywaydb*"
          - "org.junit*"
          - "io.mockk*"
          - "org.testcontainers*"
          - "com.microsoft.playwright*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
