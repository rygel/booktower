name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_e2e_tests:
        description: 'Run full E2E tests (slow, Linux only)'
        required: true
        type: boolean
        default: false

permissions:
  contents: read   # checkout only; no write access needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code quality: Linux only, no value in running linters on every OS ──────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Auto-fix formatting (prevents Spotless version drift failures)
        run: mvn spotless:apply -q

      - name: Run quality checks (no tests, no Sonar)
        run: mvn verify -DskipTests -Dflyway.skip=true -Dsonar.skip=true -T 4

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: checkstyle-report
          path: '**/target/checkstyle-result.xml'
          retention-days: 7

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: spotbugs-report
          path: '**/target/spotbugsXml.xml'
          retention-days: 7

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: pmd-report
          path: '**/target/pmd.xml'
          retention-days: 7

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: detekt-report
          path: '**/target/detekt-reports/'
          retention-days: 7

  # ── Tests: Linux first (fast, gates downstream) ──────────────────────────
  test-linux:
    name: Tests (Linux)
    needs: code-quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -Dflyway.skip=true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: test-results-ubuntu-latest
          path: '**/target/surefire-reports/'
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: jacoco-report-ubuntu-latest
          path: '**/target/site/jacoco/'
          retention-days: 14

  # ── Cross-platform tests: macOS + Windows (parallel, non-blocking) ──────
  test-cross-platform:
    name: Tests (${{ matrix.os }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        shell: bash
        run: mvn test -Dflyway.skip=true -Dsurefire.forkCount=1.5C

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ── Browser tests: Playwright on Linux (headless Chromium) ──────────────
  browser-tests:
    name: Browser Tests
    needs: test-linux
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Cache the downloaded Chromium binary (~250 MB) to avoid re-downloading
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-chromium-

      - name: Run browser tests
        run: mvn test -P browser-tests -Dflyway.skip=true

      - name: Upload browser test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: browser-test-results
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ── Build: verify the JAR assembles (Linux gates downstream, others parallel) ─
  build:
    name: Build (${{ matrix.os }})
    needs: test-linux
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package application
        shell: bash
        run: mvn package -DskipTests -Dflyway.skip=true -T 4

      - name: Upload JAR
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: runary-jar-${{ matrix.os }}
          path: runary-web/target/runary-*.jar
          retention-days: 7

  # ── Docker build: verify the image assembles correctly ───────────────────
  docker-build:
    name: Docker Build
    needs: [ build, browser-tests ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build --tag runary:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d --name bt-smoke -p 9999:8080 \
            -e RUNARY_QUICKSTART=true \
            -e RUNARY_JWT_SECRET=ci-test-secret-not-for-production \
            runary:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/health > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Container failed to start"; docker logs bt-smoke; exit 1; }
            sleep 1
          done
          # Verify it serves actual content
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9999/login)
          [ "$STATUS" = "200" ] || { echo "Login page returned $STATUS"; docker logs bt-smoke; exit 1; }
          echo "Docker smoke test passed"
          docker stop bt-smoke

  # ── Full test suite against PostgreSQL ────────────────────────────────────
  postgres-test:
    name: Tests PostgreSQL ${{ matrix.pg }}
    needs: code-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [ "17.4", "18.2" ]

    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_USER: runary
          POSTGRES_PASSWORD: runary
          POSTGRES_DB: runary
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runary"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite against PostgreSQL
        env:
          RUNARY_DB_URL: jdbc:postgresql://localhost:5432/runary
          RUNARY_DB_USERNAME: runary
          RUNARY_DB_PASSWORD: runary
          RUNARY_DB_DRIVER: org.postgresql.Driver
        run: mvn test -Dflyway.skip=false

      - name: Upload PostgreSQL test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: pg${{ matrix.pg }}-test-results
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ── E2E tests: Linux only (bash-based test script) ────────────────────────
  e2e-tests:
    name: E2E Tests (Linux)
    needs: build
    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.run_e2e_tests == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: mvn package -DskipTests -Dflyway.skip=true -T 4

      - name: Start application
        env:
          RUNARY_REGISTRATION_OPEN: "true"
        run: |
          java -jar runary-web/target/runary-*-fat.jar &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if curl -sf http://localhost:9999/health > /dev/null; then
              echo "Application ready"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Timeout waiting for app"; exit 1; }
            sleep 2
          done

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:9999
        run: |
          chmod +x e2e-test.sh
          ./e2e-test.sh

      - name: Stop application
        if: always()
        run: kill "$APP_PID" 2>/dev/null || true

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            e2e-test.log
          retention-days: 7
