name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_e2e_tests:
        description: 'Run full E2E tests (slow, Linux only)'
        required: true
        type: boolean
        default: false

permissions:
  contents: read   # checkout only; no write access needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Code quality: Linux only, no value in running linters on every OS ──────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run quality checks (no tests, no Sonar)
        run: mvn verify -DskipTests -Dflyway.skip=true -Dsonar.skip=true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: detekt-report
          path: target/detekt-reports/

  # ── Tests: run on all three supported platforms ───────────────────────────
  test:
    name: Tests (${{ matrix.os }})
    needs: code-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # keep running other OSes when one fails
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        shell: bash
        run: mvn test -Dflyway.skip=true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: target/surefire-reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/

  # ── Browser tests: Playwright on Linux (headless Chromium) ──────────────
  browser-tests:
    name: Browser Tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-browser-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Cache the downloaded Chromium binary (~250 MB) to avoid re-downloading
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-chromium-

      - name: Run browser tests
        run: mvn test -P browser-tests -Dflyway.skip=true

      - name: Upload browser test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: browser-test-results
          path: target/surefire-reports/

  # ── Build: verify the JAR assembles on all three platforms ────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package application
        shell: bash
        run: mvn package -DskipTests -Dflyway.skip=true

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: booktower-jar-${{ matrix.os }}
          path: target/booktower-*.jar

  # ── Docker build: verify the image assembles correctly ───────────────────
  docker-build:
    name: Docker Build
    needs: [ build, browser-tests ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --tag booktower:ci .

      - name: Verify image exists
        run: docker image inspect booktower:ci --format '{{.RepoTags}} {{.Config.ExposedPorts}}'

  # ── E2E tests: Linux only (bash-based test script) ────────────────────────
  e2e-tests:
    name: E2E Tests (Linux)
    needs: build
    if: >
      github.event_name == 'pull_request' ||
      github.event.inputs.run_e2e_tests == 'true' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-e2e-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build application
        run: mvn package -DskipTests -Dflyway.skip=true

      - name: Start application
        run: |
          java -jar target/booktower-*.jar &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if curl -sf http://localhost:9999/health > /dev/null; then
              echo "Application ready"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Timeout waiting for app"; exit 1; }
            sleep 2
          done

      - name: Run E2E tests
        env:
          BASE_URL: http://localhost:9999
        run: |
          chmod +x e2e-test.sh
          ./e2e-test.sh

      - name: Stop application
        if: always()
        run: kill "$APP_PID" 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            e2e-test.log
