name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # stable only: v0.5.1, v1.0.0 (not v0.5.1-beta.*)

permissions: {}  # minimal default — each job declares what it needs

jobs:
  # ── Fat JAR — runs fast on Linux, uploaded once ─────────────────────────
  fat-jar:
    name: Fat JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn package -DskipTests -Dflyway.skip=true

      - name: Rename fat JAR
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          FAT=$(find runary-web/target/ -name "runary-*-fat.jar" | head -1)
          cp "$FAT" "runary-web/target/runary-${REF_NAME}.jar"

      - name: Generate SHA256 checksum
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd runary-web/target/
          sha256sum "runary-${REF_NAME}.jar" > "runary-${REF_NAME}.jar.sha256"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fat-jar
          path: |
            runary-web/target/runary-${{ github.ref_name }}.jar
            runary-web/target/runary-${{ github.ref_name }}.jar.sha256

  # ── Native binaries — one job per platform ────────────────────────────────
  native:
    name: Native (${{ matrix.label }})
    continue-on-error: true  # experimental — don't block the release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary: runary
            asset: runary-linux-x64

          - os: ubuntu-24.04-arm
            label: linux-arm64
            binary: runary
            asset: runary-linux-arm64

          - os: macos-15-intel    # Intel runner
            label: macos-x64
            binary: runary
            asset: runary-macos-x64

          - os: macos-latest      # Apple Silicon (M-series)
            label: macos-arm64
            binary: runary
            asset: runary-macos-arm64

          - os: windows-latest
            label: windows-x64
            binary: runary.exe
            asset: runary-windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # GraalVM CE — includes native-image out of the box
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1 # v1.5.0
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      # Skip the maven-enforcer exact-version check — GraalVM reports a
      # slightly different java.version string than stock Temurin.
      - name: Build native binary
        shell: bash
        run: mvn package -Pnative -DskipTests "-Dflyway.skip=true" "-Denforcer.skip=true"

      - name: Start native binary
        shell: bash
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
        run: |
          chmod +x "runary-web/target/${MATRIX_BINARY}" 2>/dev/null || true
          RUNARY_QUICKSTART=true RUNARY_JWT_SECRET=ci-release-test "runary-web/target/${MATRIX_BINARY}" &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/health > /dev/null 2>&1; then
              echo "Native binary healthy after ${i}s"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Native binary failed to start"; exit 1; }
            sleep 2
          done

      - name: Run E2E tests against native binary
        shell: bash
        run: |
          chmod +x e2e-test.sh 2>/dev/null || true
          BASE_URL=http://localhost:9999 ./e2e-test.sh

      - name: Run integration tests against native binary
        shell: bash
        run: mvn test -P e2e-external -De2e.baseUrl=http://localhost:9999 -Dflyway.skip=true

      - name: Stop native binary
        if: always()
        shell: bash
        run: kill "$APP_PID" 2>/dev/null || true

      - name: Rename binary
        shell: bash
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_ASSET: ${{ matrix.asset }}
        run: |
          cp "runary-web/target/${MATRIX_BINARY}" "runary-web/target/${MATRIX_ASSET}"

      - name: Generate SHA256 checksum
        shell: bash
        env:
          MATRIX_ASSET: ${{ matrix.asset }}
        run: |
          cd runary-web/target/
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${MATRIX_ASSET}" > "${MATRIX_ASSET}.sha256"
          else
            shasum -a 256 "${MATRIX_ASSET}" > "${MATRIX_ASSET}.sha256"
          fi

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: native-${{ matrix.label }}
          path: |
            runary-web/target/${{ matrix.asset }}
            runary-web/target/${{ matrix.asset }}.sha256

  # ── Docker image — multi-arch, pushed to ghcr.io ────────────────────────
  # Uses the pre-built fat JAR from the fat-jar job to avoid rebuilding
  # Maven inside Docker (which takes 25+ min under QEMU for ARM64).
  docker:
    name: Docker Image
    needs: fat-jar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download fat JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fat-jar
          path: docker-build/

      - name: Prepare Docker context
        run: |
          cp docker-build/runary-*.jar docker-build/app.jar
          cat > docker-build/Dockerfile <<'DOCKERFILE'
          FROM eclipse-temurin:21.0.9_10-jre-jammy
          WORKDIR /app
          RUN groupadd -r runary && useradd -r -g runary runary
          COPY app.jar app.jar
          RUN mkdir -p /data/books /data/covers /data/db && \
              chown -R runary:runary /data /app
          USER runary
          EXPOSE 8080
          ENV RUNARY_ENV=production \
              RUNARY_PORT=8080
          ENTRYPOINT ["java", "-Xms128m", "-Xmx512m", "-jar", "app.jar"]
          DOCKERFILE

      - name: Set up QEMU (for ARM64 builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: docker-build
          file: docker-build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release — collects all artifacts and publishes ────────────────
  publish:
    name: Publish Release
    needs: [ fat-jar, docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runary ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-rc1 → pre-release
          body: |
            ## Runary ${{ github.ref_name }}

            ### Quick start (self-hosted)

            **Linux / macOS:**
            ```bash
            chmod +x runary-linux-x64   # or macos-arm64, etc.
            RUNARY_QUICKSTART=true ./runary-linux-x64
            # Open http://localhost:9999  •  demo / demo1234
            ```

            **Windows:**
            ```powershell
            $env:RUNARY_QUICKSTART="true"
            .\runary-windows-x64.exe
            # Open http://localhost:9999  •  demo / demo1234
            ```

            **Fat JAR (requires Java 21+):**
            ```bash
            RUNARY_QUICKSTART=true java -jar runary-${{ github.ref_name }}.jar
            ```

            **Docker (linux/amd64 + linux/arm64):**
            ```bash
            docker run -p 9999:8080 -e RUNARY_QUICKSTART=true ghcr.io/rygel/runary:latest
            ```

            ### Downloads
            | File | Platform |
            |------|----------|
            | `runary-linux-x64` | Linux x86-64 |
            | `runary-linux-arm64` | Linux ARM64 (Raspberry Pi, AWS Graviton …) |
            | `runary-macos-x64` | macOS Intel |
            | `runary-macos-arm64` | macOS Apple Silicon |
            | `runary-windows-x64.exe` | Windows x86-64 |
            | `runary-${{ github.ref_name }}.jar` | Fat JAR (any platform, needs Java 21) |

            > Native binaries include the JVM — no installation required.
            > Set `RUNARY_ENV=production` and `RUNARY_JWT_SECRET=<random>` for production deployments.
          files: |
            dist/fat-jar/*
            dist/native-linux-x64/*
            dist/native-linux-arm64/*
            dist/native-macos-x64/*
            dist/native-macos-arm64/*
            dist/native-windows-x64/*
