name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # stable only: v0.5.1, v1.0.0 (not v0.5.1-beta.*)

permissions:
  contents: write    # needed to create GitHub Releases and upload assets
  packages: write    # needed to push Docker images to ghcr.io

jobs:
  # ── Fat JAR — runs fast on Linux, uploaded once ─────────────────────────
  fat-jar:
    name: Fat JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build fat JAR
        run: mvn package -DskipTests -Dflyway.skip=true

      - name: Rename fat JAR
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          FAT=$(find target/ -name "booktower-*-fat.jar" | head -1)
          cp "$FAT" "target/booktower-${REF_NAME}.jar"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fat-jar
          path: target/booktower-${{ github.ref_name }}.jar

  # ── Native binaries — one job per platform ────────────────────────────────
  native:
    name: Native (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary: booktower
            asset: booktower-linux-x64

          - os: ubuntu-24.04-arm
            label: linux-arm64
            binary: booktower
            asset: booktower-linux-arm64

          - os: macos-15-intel    # Intel runner
            label: macos-x64
            binary: booktower
            asset: booktower-macos-x64

          - os: macos-latest      # Apple Silicon (M-series)
            label: macos-arm64
            binary: booktower
            asset: booktower-macos-arm64

          - os: windows-latest
            label: windows-x64
            binary: booktower.exe
            asset: booktower-windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # GraalVM CE — includes native-image out of the box
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085 # v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-native-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Skip the maven-enforcer exact-version check — GraalVM reports a
      # slightly different java.version string than stock Temurin.
      - name: Build native binary
        shell: bash
        run: mvn package -Pnative -DskipTests "-Dflyway.skip=true" "-Denforcer.skip=true"

      - name: Start native binary
        shell: bash
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
        run: |
          chmod +x "target/${MATRIX_BINARY}" 2>/dev/null || true
          BOOKTOWER_QUICKSTART=true BOOKTOWER_JWT_SECRET=ci-release-test "target/${MATRIX_BINARY}" &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/health > /dev/null 2>&1; then
              echo "Native binary healthy after ${i}s"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Native binary failed to start"; exit 1; }
            sleep 2
          done

      - name: Run E2E tests against native binary
        shell: bash
        run: |
          chmod +x e2e-test.sh 2>/dev/null || true
          BASE_URL=http://localhost:9999 ./e2e-test.sh

      - name: Run integration tests against native binary
        shell: bash
        run: mvn test -P e2e-external -De2e.baseUrl=http://localhost:9999 -Dflyway.skip=true

      - name: Stop native binary
        if: always()
        shell: bash
        run: kill "$APP_PID" 2>/dev/null || true

      - name: Rename binary
        shell: bash
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_ASSET: ${{ matrix.asset }}
        run: |
          cp "target/${MATRIX_BINARY}" "target/${MATRIX_ASSET}"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: native-${{ matrix.label }}
          path: target/${{ matrix.asset }}

  # ── Docker image — multi-arch, pushed to ghcr.io ────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (for ARM64 builds)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release — collects all artifacts and publishes ────────────────
  publish:
    name: Publish Release
    needs: [ fat-jar, native, docker ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BookTower ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-rc1 → pre-release
          body: |
            ## BookTower ${{ github.ref_name }}

            ### Quick start (self-hosted)

            **Linux / macOS:**
            ```bash
            chmod +x booktower-linux-x64   # or macos-arm64, etc.
            BOOKTOWER_QUICKSTART=true ./booktower-linux-x64
            # Open http://localhost:9999  •  demo / demo1234
            ```

            **Windows:**
            ```powershell
            $env:BOOKTOWER_QUICKSTART="true"
            .\booktower-windows-x64.exe
            # Open http://localhost:9999  •  demo / demo1234
            ```

            **Fat JAR (requires Java 21+):**
            ```bash
            BOOKTOWER_QUICKSTART=true java -jar booktower-${{ github.ref_name }}.jar
            ```

            **Docker (linux/amd64 + linux/arm64):**
            ```bash
            docker run -p 9999:8080 -e BOOKTOWER_QUICKSTART=true ghcr.io/rygel/booktower:latest
            ```

            ### Downloads
            | File | Platform |
            |------|----------|
            | `booktower-linux-x64` | Linux x86-64 |
            | `booktower-linux-arm64` | Linux ARM64 (Raspberry Pi, AWS Graviton …) |
            | `booktower-macos-x64` | macOS Intel |
            | `booktower-macos-arm64` | macOS Apple Silicon |
            | `booktower-windows-x64.exe` | Windows x86-64 |
            | `booktower-${{ github.ref_name }}.jar` | Fat JAR (any platform, needs Java 21) |

            > Native binaries include the JVM — no installation required.
            > Set `BOOKTOWER_ENV=production` and `BOOKTOWER_JWT_SECRET=<random>` for production deployments.
          files: |
            dist/fat-jar/*
            dist/native-linux-x64/*
            dist/native-linux-arm64/*
            dist/native-macos-x64/*
            dist/native-macos-arm64/*
            dist/native-windows-x64/*
