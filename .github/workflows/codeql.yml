name: CodeQL

on:
  schedule:
    - cron: '0 6 * * 1'   # Weekly, Monday 06:00 UTC — too slow for every PR

permissions: {}

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # Note: CodeQL's Kotlin extractor may lag behind the latest Kotlin version.
    # If the build fails with "Kotlin version too recent", wait for a CodeQL update.
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for CodeQL
        run: mvn compile -q -T 4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          category: '/language:java-kotlin'
