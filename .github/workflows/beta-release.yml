name: Beta Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Create a beta pre-release from develop'
        required: true
        default: 'yes'

permissions:
  contents: write
  packages: write

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    # Only run after the CI workflow succeeds (tests + quality checks)
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Generate beta tag
        id: tag
        env:
          COMMIT_SHA: ${{ github.sha }}
          PROJECT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          DATE=$(date -u +%Y%m%d)
          TAG="v${PROJECT_VERSION}-beta.${DATE}.${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Beta tag: $TAG"

      - name: Build fat JAR
        run: mvn package -DskipTests -Dflyway.skip=true -q

      - name: Rename fat JAR
        env:
          BETA_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          FAT=$(find runary-web/target/ -name "runary-*-fat.jar" | head -1)
          cp "$FAT" "runary-web/target/runary-${BETA_TAG}.jar"

      - name: Create beta release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "Runary ${{ steps.tag.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## Beta Release

            Automated beta build from `develop` branch.

            **Commit:** ${{ github.sha }}
            **Version:** ${{ steps.version.outputs.version }}

            > This is a pre-release. For stable releases, see tags without `-beta`.

            ### Quick start
            ```bash
            # Fat JAR (requires Java 21+)
            RUNARY_QUICKSTART=true java -jar runary-${{ steps.tag.outputs.tag }}.jar

            # Docker
            docker run -p 9999:8080 -e RUNARY_QUICKSTART=true ghcr.io/rygel/runary:beta
            ```
          files: |
            runary-web/target/runary-${{ steps.tag.outputs.tag }}.jar

  # ── Docker beta image — multi-arch, pushed to ghcr.io ─────────────────
  docker-beta:
    name: Docker Beta Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max
