name: Beta Release

on:
  push:
    branches: [ develop ]

permissions:
  contents: write
  packages: write

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    # Only run after the CI workflow succeeds (tests + quality checks)
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-beta-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Generate beta tag
        id: tag
        env:
          COMMIT_SHA: ${{ github.sha }}
          PROJECT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          DATE=$(date -u +%Y%m%d)
          TAG="v${PROJECT_VERSION}-beta.${DATE}.${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Beta tag: $TAG"

      - name: Build fat JAR
        run: mvn package -DskipTests -Dflyway.skip=true -q

      - name: Rename fat JAR
        env:
          BETA_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          FAT=$(find target/ -name "booktower-*-fat.jar" | head -1)
          cp "$FAT" "target/booktower-${BETA_TAG}.jar"

      - name: Create beta release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "BookTower ${{ steps.tag.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## Beta Release

            Automated beta build from `develop` branch.

            **Commit:** ${{ github.sha }}
            **Version:** ${{ steps.version.outputs.version }}

            > This is a pre-release. For stable releases, see tags without `-beta`.

            ### Quick start
            ```bash
            # Fat JAR (requires Java 21+)
            BOOKTOWER_QUICKSTART=true java -jar booktower-${{ steps.tag.outputs.tag }}.jar

            # Docker
            docker run -p 9999:8080 -e BOOKTOWER_QUICKSTART=true ghcr.io/rygel/booktower:beta
            ```
          files: |
            target/booktower-${{ steps.tag.outputs.tag }}.jar

  # ── Docker beta image — multi-arch, pushed to ghcr.io ─────────────────
  docker-beta:
    name: Docker Beta Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:beta
          cache-from: type=gha
          cache-to: type=gha,mode=max
