name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 6 * * 1'   # Weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to the Security tab

jobs:
  # ── actionlint: catch workflow syntax/logic errors early ───────────────────
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.11

  # ── zizmor: audit workflows for security vulnerabilities ──────────────────
  # Detects issues like script injection, overly-broad permissions,
  # unsafe use of pull_request_target, etc.
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor --quiet

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zizmor --format sarif .github/workflows/ > zizmor.sarif || true
        # continue-on-error so the SARIF upload still runs even when findings exist

      - name: Upload zizmor SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ── CodeQL: deep semantic analysis of Kotlin/Java source code ────────────
  # Detects SQL injection, path traversal, XSS, insecure crypto, etc.
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Build for CodeQL
        run: mvn package -DskipTests -Dflyway.skip=true -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-java-kotlin

  # ── Checkov: scan Dockerfile for misconfigurations ────────────────────────
  checkov:
    name: Checkov (Dockerfile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true   # report findings but don't fail the job

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
