name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to the Security tab

jobs:
  # ── actionlint: catch workflow syntax/logic errors early ───────────────────
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  # ── zizmor: audit workflows for security vulnerabilities ──────────────────
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor --quiet

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zizmor --format sarif .github/workflows/ > zizmor.sarif || true

      - name: Upload zizmor SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ── CodeQL: deep semantic analysis of Kotlin/Java source code ────────────
  # Note: CodeQL's Kotlin extractor may lag behind the latest Kotlin version.
  # If the build fails with "Kotlin version too recent", wait for a CodeQL update.
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          languages: java-kotlin

      - name: Build for CodeQL
        run: mvn package -DskipTests -Dflyway.skip=true -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          category: codeql-java-kotlin

  # ── Gitleaks: scan for secrets, API keys, tokens in code and history ─────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0   # full history for scanning commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Hadolint: Dockerfile best practices and ShellCheck for RUN commands ──
  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true

      - name: Upload Hadolint SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  # ── Checkov: scan Dockerfile for security misconfigurations ─────────────
  checkov:
    name: Checkov (Dockerfile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@0ce65fae06c148e349f955c3c35ad049c11e838c # v12
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: .
          soft_fail: true

      - name: Find Checkov SARIF output
        if: always()
        id: find-sarif
        run: |
          if [ -f results.sarif ]; then echo "file=results.sarif" >> "$GITHUB_OUTPUT"
          elif [ -f results/results.sarif ]; then echo "file=results/results.sarif" >> "$GITHUB_OUTPUT"
          else echo "file=" >> "$GITHUB_OUTPUT"; echo "No SARIF file found"; fi

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always() && steps.find-sarif.outputs.file != ''
        with:
          sarif_file: ${{ steps.find-sarif.outputs.file }}
          category: checkov

  # ── OSSF Scorecard: assess project security posture ─────────────────────
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    # Scorecard only supports the default branch (main)
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
      id-token: write   # needed for Scorecard's OIDC publish

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: scorecard
